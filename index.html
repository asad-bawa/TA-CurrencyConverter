<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Currency Converter</title>
<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-alt: #f3f1ec;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-tertiary: #9a9a9a;
    --border: #e3e1da;
    --border-hover: #c9c6bc;
    --accent: #c96442;
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --surface: #262626;
      --surface-alt: #2e2e2e;
      --text: #f0eee6;
      --text-muted: #a0a0a0;
      --text-tertiary: #707070;
      --border: #3a3a3a;
      --border-hover: #4d4d4d;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.5;
  }
  .card {
    width: 100%;
    max-width: 460px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 4px;
  }
  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin: 0 0 20px;
  }
  .row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  input[type="number"] {
    flex: 1;
    height: 48px;
    padding: 0 12px;
    font-size: 18px;
    font-weight: 500;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="number"]:focus { border-color: var(--accent); }
  select {
    width: 110px;
    height: 48px;
    padding: 0 10px;
    font-size: 14px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: inherit;
    cursor: pointer;
    outline: none;
  }
  select:hover { border-color: var(--border-hover); }
  .swap-row {
    display: flex;
    justify-content: center;
    margin: 4px 0;
  }
  .swap-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .swap-btn:hover { color: var(--text); border-color: var(--border-hover); }
  .rate-info {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    margin: 12px 0 16px;
    font-variant-numeric: tabular-nums;
  }
  .rates-section {
    background: var(--surface-alt);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-top: 8px;
  }
  .rates-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .rates-title { font-size: 13px; color: var(--text-muted); }
  .toggle-btn {
    font-size: 12px;
    color: var(--text-muted);
    background: transparent;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
  }
  .toggle-btn:hover { color: var(--text); border-color: var(--border-hover); }
  .rate-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 6px;
    margin-top: 12px;
  }
  .rate-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }
  .rate-item label {
    width: 36px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .rate-item input {
    flex: 1;
    height: 30px;
    font-size: 13px;
    padding: 0 8px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    outline: none;
  }
  .rate-item input:focus { border-color: var(--accent); }
  .hidden { display: none; }
  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Currency Converter</h1>
  <p class="subtitle">Convert between 21 currencies. Rates are editable below.</p>

  <div class="row">
    <input type="number" id="from-amount" value="100" step="any" />
    <select id="from-cur"></select>
  </div>

  <div class="swap-row">
    <button class="swap-btn" id="swap" aria-label="Swap currencies">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10l5-5 5 5"/><path d="M7 14l5 5 5-5"/></svg>
    </button>
  </div>

  <div class="row">
    <input type="number" id="to-amount" value="118" step="any" />
    <select id="to-cur"></select>
  </div>

  <div class="rate-info" id="rate-info">—</div>

  <div class="rates-section">
    <div class="rates-head">
      <span class="rates-title">Exchange rates (1 unit → USD)</span>
      <button class="toggle-btn" id="edit-toggle">Edit</button>
    </div>
    <div class="rate-grid hidden" id="rate-grid"></div>
  </div>

  <p class="footer">Rates stored locally. Refresh resets to defaults.</p>
</div>

<script>
const rates = {
  USD: 1,
  ILS: 0.33, EUR: 1.18, GBP: 1.35, CAD: 0.72, INR: 0.01145,
  AUD: 0.65, SGD: 0.77, DKK: 0.15, BGN: 0.58, BRL: 0.18,
  IDR: 0.00007, MXN: 0.05, AED: 0.27, CNY: 0.14, KRW: 0.00072,
  RON: 0.22, ZAR: 0.06, CRC: 0.0019, CLP: 0.001, CHF: 1.21
};

// Load saved rates from localStorage if present
try {
  const saved = localStorage.getItem('cc-rates');
  if (saved) Object.assign(rates, JSON.parse(saved));
} catch (e) {}

const codes = Object.keys(rates);
const fromCur = document.getElementById('from-cur');
const toCur = document.getElementById('to-cur');
const fromAmt = document.getElementById('from-amount');
const toAmt = document.getElementById('to-amount');
const info = document.getElementById('rate-info');
const swap = document.getElementById('swap');
const editBtn = document.getElementById('edit-toggle');
const grid = document.getElementById('rate-grid');

codes.forEach(c => {
  fromCur.add(new Option(c, c));
  toCur.add(new Option(c, c));
});
fromCur.value = 'EUR';
toCur.value = 'USD';

function fmt(n) {
  if (!isFinite(n)) return '—';
  if (Math.abs(n) >= 1000) return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
  if (Math.abs(n) >= 1) return n.toFixed(2);
  return n.toFixed(4);
}

function convert(amount, from, to) {
  return amount * rates[from] / rates[to];
}

let lastEdited = 'from';

function recalc() {
  const from = fromCur.value, to = toCur.value;
  if (lastEdited === 'from') {
    const v = parseFloat(fromAmt.value) || 0;
    toAmt.value = fmt(convert(v, from, to));
  } else {
    const v = parseFloat(toAmt.value) || 0;
    fromAmt.value = fmt(convert(v, to, from));
  }
  info.textContent = `1 ${from} = ${fmt(convert(1, from, to))} ${to}`;
}

function saveRates() {
  try { localStorage.setItem('cc-rates', JSON.stringify(rates)); } catch (e) {}
}

function buildRateGrid() {
  grid.innerHTML = '';
  codes.filter(c => c !== 'USD').forEach(code => {
    const row = document.createElement('div');
    row.className = 'rate-item';
    const label = document.createElement('label');
    label.textContent = code;
    const input = document.createElement('input');
    input.type = 'number';
    input.step = 'any';
    input.value = rates[code];
    input.addEventListener('input', () => {
      const v = parseFloat(input.value);
      if (!isNaN(v) && v > 0) {
        rates[code] = v;
        saveRates();
        recalc();
      }
    });
    row.appendChild(label);
    row.appendChild(input);
    grid.appendChild(row);
  });
}

fromAmt.addEventListener('input', () => { lastEdited = 'from'; recalc(); });
toAmt.addEventListener('input', () => { lastEdited = 'to'; recalc(); });
fromCur.addEventListener('change', recalc);
toCur.addEventListener('change', recalc);

swap.addEventListener('click', () => {
  const a = fromCur.value;
  fromCur.value = toCur.value;
  toCur.value = a;
  lastEdited = 'from';
  recalc();
});

editBtn.addEventListener('click', () => {
  const isHidden = grid.classList.contains('hidden');
  grid.classList.toggle('hidden');
  editBtn.textContent = isHidden ? 'Done' : 'Edit';
});

buildRateGrid();
recalc();
</script>
</body>
</html>
