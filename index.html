<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TA Offer Currency Converter</title>
<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-alt: #f3f1ec;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-tertiary: #9a9a9a;
    --border: #e3e1da;
    --border-hover: #c9c6bc;
    --accent: #c96442;
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --surface: #262626;
      --surface-alt: #2e2e2e;
      --text: #f0eee6;
      --text-muted: #a0a0a0;
      --text-tertiary: #707070;
      --border: #3a3a3a;
      --border-hover: #4d4d4d;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.5;
  }
  .card {
    width: 100%;
    max-width: 460px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 4px;
  }
  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin: 0 0 8px;
  }
  .rate-period {
    display: inline-block;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface-alt);
    padding: 4px 10px;
    border-radius: 6px;
    margin-bottom: 20px;
  }
  .row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  /* Using type="text" with inputmode for commas to display properly */
  input.amount {
    flex: 1;
    height: 48px;
    padding: 0 12px;
    font-size: 18px;
    font-weight: 500;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    outline: none;
    transition: border-color 0.15s;
  }
  input.amount:focus { border-color: var(--accent); }
  select {
    width: 110px;
    height: 48px;
    padding: 0 10px;
    font-size: 14px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: inherit;
    cursor: pointer;
    outline: none;
  }
  select:hover { border-color: var(--border-hover); }
  .swap-row {
    display: flex;
    justify-content: center;
    margin: 4px 0;
  }
  .swap-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .swap-btn:hover { color: var(--text); border-color: var(--border-hover); }
  .rate-info {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    margin: 12px 0 16px;
    font-variant-numeric: tabular-nums;
  }
  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>
<div class="card">
  <h1>Offer currency converter</h1>
  <p class="subtitle">Convert candidate offers to and from USD using approved company rates.</p>
  <span class="rate-period">Rates effective Q2 2026</span>

  <div class="row">
    <input type="text" inputmode="decimal" id="from-amount" class="amount" value="100,000" />
    <select id="from-cur"></select>
  </div>

  <div class="swap-row">
    <button class="swap-btn" id="swap" aria-label="Swap currencies">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10l5-5 5 5"/><path d="M7 14l5 5 5-5"/></svg>
    </button>
  </div>

  <div class="row">
    <input type="text" inputmode="decimal" id="to-amount" class="amount" />
    <select id="to-cur"></select>
  </div>

  <div class="rate-info" id="rate-info">—</div>

  <p class="footer">Rates approved by Comp. Update each quarter — see README in the repo.</p>
</div>

<script>
// ============================================================
// QUARTERLY RATE UPDATE — edit the values below each quarter.
// Rate format: 1 unit of that currency = X USD.
// After saving, also update the "Rates effective Q_ ____" label
// in the HTML above (search: rate-period) and the page <title>.
// ============================================================
const RATES = {
  USD: 1,
  ILS: 0.33,
  EUR: 1.18,
  GBP: 1.35,
  CAD: 0.72,
  INR: 0.01145,
  AUD: 0.65,
  SGD: 0.77,
  DKK: 0.15,
  BGN: 0.58,
  BRL: 0.18,
  IDR: 0.00007,
  MXN: 0.05,
  AED: 0.27,
  CNY: 0.14,
  KRW: 0.00072,
  RON: 0.22,
  ZAR: 0.06,
  CRC: 0.0019,
  CLP: 0.001,
  CHF: 1.21
};
// ============================================================

const codes = Object.keys(RATES);
const fromCur = document.getElementById('from-cur');
const toCur = document.getElementById('to-cur');
const fromAmt = document.getElementById('from-amount');
const toAmt = document.getElementById('to-amount');
const info = document.getElementById('rate-info');
const swap = document.getElementById('swap');

codes.forEach(c => {
  fromCur.add(new Option(c, c));
  toCur.add(new Option(c, c));
});
fromCur.value = 'USD';
toCur.value = 'EUR';

// Strip commas and any other non-numeric chars (keep digits, dot, minus)
function parseAmount(str) {
  if (!str) return 0;
  const cleaned = String(str).replace(/[^0-9.\-]/g, '');
  const n = parseFloat(cleaned);
  return isNaN(n) ? 0 : n;
}

// Format with commas. Salary numbers round to whole units, sub-1 values keep precision.
function fmtAmount(n) {
  if (!isFinite(n)) return '';
  if (Math.abs(n) >= 1) return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
  return n.toLocaleString(undefined, { maximumFractionDigits: 4 });
}

function fmtRate(n) {
  if (!isFinite(n)) return '—';
  if (Math.abs(n) >= 100) return n.toFixed(2);
  if (Math.abs(n) >= 1) return n.toFixed(4);
  return n.toFixed(6);
}

function convert(amount, from, to) {
  return amount * RATES[from] / RATES[to];
}

let lastEdited = 'from';

function recalc() {
  const from = fromCur.value, to = toCur.value;
  if (lastEdited === 'from') {
    const v = parseAmount(fromAmt.value);
    toAmt.value = fmtAmount(convert(v, from, to));
  } else {
    const v = parseAmount(toAmt.value);
    fromAmt.value = fmtAmount(convert(v, to, from));
  }
  info.textContent = `1 ${from} = ${fmtRate(convert(1, from, to))} ${to}`;
}

// Re-format the field the user just left (adds commas after they finish typing)
function reformat(input) {
  const v = parseAmount(input.value);
  if (v) input.value = fmtAmount(v);
}

fromAmt.addEventListener('input', () => { lastEdited = 'from'; recalc(); });
toAmt.addEventListener('input', () => { lastEdited = 'to'; recalc(); });
fromAmt.addEventListener('blur', () => reformat(fromAmt));
toAmt.addEventListener('blur', () => reformat(toAmt));
fromCur.addEventListener('change', recalc);
toCur.addEventListener('change', recalc);

swap.addEventListener('click', () => {
  const a = fromCur.value;
  fromCur.value = toCur.value;
  toCur.value = a;
  lastEdited = 'from';
  recalc();
});

recalc();
</script>
</body>
</html>
